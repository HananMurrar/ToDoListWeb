<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>To Do List</title>

    <style>
        * {
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        body {
            background: #e8f4fd;
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .section {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
        }

        label {
            font-weight: 600;
            color: black;
        }

        input[type="text"],
        input[type="date"] {
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        input[type="text"]:focus,
        input[type="date"]:focus {
            outline: none;
            border: 1px solid #4a90e2;
        }

        .add-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .task-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .task-box.completed {
            border-left: 5px solid #27ae60;
        }

        .task-box.overdue {
            border-left: 5px solid #e74c3c;
        }

        .task-box.completed input[type="text"] {
            text-decoration: line-through;
        }

        .task-list {
            margin-top: 20px;
        }

        .task-list p {
            text-align: center;
            color: black;
        }

        .error-msg,
        .success-msg {
            color: black;
            font-size: 14px;
            margin-top: 5px;
        }

        .add-button,
        .update-button,
        .delete-button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.1s, opacity 0.2s;
        }

        .add-button {
            background: #4a90e2;
        }

        .update-button {
            background: #27ae60;
        }

        .delete-button {
            background: #e74c3c;
        }

        .add-button:hover,
        .update-button:hover,
        .delete-button:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.97);
        }
    </style>
</head>

<body>
    <h1>To Do List</h1>

    <div class="container">
        <div class="section">
            <h2>Add New Task</h2>

            <div class="add-box">
                <label>Title</label>
                <input type="text" id="title" placeholder="Enter task title">

                <label>Description</label>
                <input type="text" id="description" placeholder="Enter description">

                <label>Due Date</label>
                <input type="date" id="dueDate">

                <button class="add-button" onclick="addTask()">Add Task</button>

                <div id="add-msg" class="error-msg"></div>
            </div>
        </div>

        <div class="section">
            <h2>All Tasks</h2>

            <div id="task-list" class="task-list"></div>
        </div>
    </div>

    <script>
        const baseUrl = 'http://localhost:8080/tasks';

        function showMsg(id, msg, isSuccess = false) {
            const div = document.getElementById(id);
            div.innerText = msg;
            div.className = isSuccess ? 'success-msg' : 'error-msg';

            setTimeout(() => div.innerText = '', 3000);
        }

        async function getTasks() {
            try {
                const res = await fetch(baseUrl);
                const tasks = await res.json();
                const taskDiv = document.getElementById('task-list');
                taskDiv.innerHTML = '';

                if (!tasks || tasks.length === 0) {
                    taskDiv.innerHTML = '<p>No tasks yet</p>';
                    return;
                }

                tasks.forEach(task => {
                    const div = document.createElement('div');
                    let classes = 'task-box';
                    const today = new Date();
                    const dueDate = task.dueDate ? new Date(task.dueDate) : null;

                    if (task.completed) {
                        classes += ' completed';
                    }
                    else if (dueDate && dueDate < today) {
                        classes += ' overdue';
                    }

                    div.className = classes;
                    div.innerHTML = `
                    <label>Title</label>
                    <input type="text" value="${task.title}" id="title-${task.id}">
                    
                    <label>Description</label>
                    <input type="text" value="${task.description || ''}" id="desc-${task.id}">
                    
                    <label>Due Date</label>
                    <input type="date" value="${task.dueDate || ''}" id="due-${task.id}">
                    
                    <label>Completed<input type="checkbox" id="completed-${task.id}" ${task.completed ? 'checked' : ''}></label>
                    
                    <button class="update-button" onclick="updateTask(${task.id})">Update Task</button>
                    <button class="delete-button" onclick="deleteTask(${task.id})">Delete Task</button>
                    `;

                    taskDiv.appendChild(div);
                });
            }
            catch (err) {
                console.error(err);
                document.getElementById('task-list').innerHTML = '<p>Failed to load tasks</p>';
            }
        }

        async function addTask() {
            const title = document.getElementById('title').value.trim();
            const description = document.getElementById('description').value.trim();
            const dueDate = document.getElementById('dueDate').value;

            if (!title) {
                showMsg('add-msg', 'Title is required');
                return;
            }
            try {
                const res = await fetch(baseUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description, completed: false, dueDate })
                });

                if (!res.ok) {
                    const message = await res.text();
                    showMsg('add-msg', message);
                    return;
                }

                document.getElementById('title').value = '';
                document.getElementById('description').value = '';
                document.getElementById('dueDate').value = '';

                showMsg('add-msg', 'Task added successfully', true);
                getTasks();
            }
            catch (err) {
                showMsg('add-msg', 'Server connection failed');
                console.error(err);
            }
        }

        async function updateTask(id) {
            const title = document.getElementById(`title-${id}`).value.trim();
            const description = document.getElementById(`desc-${id}`).value.trim();
            const completed = document.getElementById(`completed-${id}`).checked;
            const dueDate = document.getElementById(`due-${id}`).value;

            if (!title) {
                showMsg('add-msg', 'Title is required');
                return;
            }

            try {
                const res = await fetch(`${baseUrl}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, description, completed, dueDate })
                });

                if (!res.ok) {
                    const message = await res.text();
                    showMsg('add-msg', message);
                    return;
                }

                showMsg('add-msg', 'Task updated successfully', true);
                getTasks();
            }
            catch (err) {
                showMsg('add-msg', 'Failed to update task');
                console.error(err);
            }
        }

        async function deleteTask(id) {
            if (!confirm('Are you sure you want to delete this task ?')) return;

            try {
                const res = await fetch(`${baseUrl}/${id}`, { method: 'DELETE' });

                if (!res.ok) {
                    const message = await res.text();
                    showMsg('add-msg', message);
                    return;
                }

                getTasks();
            }
            catch (err) {
                showMsg('add-msg', 'Failed to delete task');
                console.error(err);
            }
        }

        getTasks();
    </script>
</body>

</html>
