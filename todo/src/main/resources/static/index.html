<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>To Do List</title>

    <style>
        * {
            font-family: 'Times New Roman', Times, serif;
            box-sizing: border-box;
        }

        body {
            background: rgb(238, 237, 237);
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .section {
            background: white;
            padding: 25px;
            width: 350px;
            border-radius: 10px;
        }

        label {
            font-weight: 600;
            color: black;
        }

        input[type="text"] {
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            border: 1px solid #ccc;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border: 1px solid #4a90e2;
        }

        .add-box {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .add-button,
        .update-button,
        .delete-button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.1s;
        }

        .add-button {
            background: #4a90e2;
        }

        .update-button {
            background: #27ae60;
        }

        .delete-button {
            background: #e74c3c;
        }

        .add-button:hover,
        .update-button:hover,
        .delete-button:hover {
            transform: translateY(-1px);
        }

        .task-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
            background: white;
            border: 1px solid #ccc;
        }

        .task-box.completed input[type="text"] {
            text-decoration: line-through;
            color: black;
        }

        .error-msg,
        .success-msg {
            color: black;
            font-size: 14px;
        }
    </style>
</head>

<body>
<h1>To Do List</h1>

<div class="container">
    <!-- add task section -->
    <div class="section">
        <h2>Add New Task</h2>
        <div class="add-box">
            <label for="title">Title</label>
            <input type="text" id="title" placeholder="Enter task title (required)">

            <label for="description">Description</label>
            <input type="text" id="description" placeholder="Enter task description (optional)">

            <button class="add-button" onclick="addTask()">Add Task</button>

            <div id="add-msg" class="error-msg"></div>
        </div>
    </div>

    <!-- all tasks section -->
    <div class="section">
        <h2>All Tasks</h2>
        <div id="task-list" style="margin-top: 20px;"></div>
    </div>
</div>

<script>
    const baseUrl = 'http://localhost:8080/tasks';

    // function to show messages, error or success
    function showMsg(id, msg, isSuccess = false) {
        const div = document.getElementById(id);
        div.innerText = msg;
        div.className = isSuccess ? 'success-msg' : 'error-msg';
        setTimeout(() => div.innerText = '', 3000);
    }

    // get all tasks from server and display
    async function getTasks() {
        try {
            const res = await fetch(baseUrl);
            const tasks = await res.json();
            const taskDiv = document.getElementById('task-list');
            taskDiv.innerHTML = '';

            if (tasks.length === 0) {
                taskDiv.innerHTML = '<p>No tasks yet, add a new task</p>';
                return;
            }

            tasks.forEach(task => {
                const div = document.createElement('div');
                div.className = 'task-box' + (task.completed ? ' completed' : '');
                div.innerHTML = `
                <label>Title</label>
                <input type="text" value="${task.title}" id="title-${task.id}">
                <label>Description</label>
                <input type="text" value="${task.description}" id="desc-${task.id}">
                <label>Completed
                    <input type="checkbox" id="completed-${task.id}" ${task.completed ? 'checked' : ''}>
                </label>

                <button class="update-button" onclick="updateTask(${task.id})">Update Task</button>
                <button class="delete-button" onclick="deleteTask(${task.id})">Delete Task</button>
            `;
                taskDiv.appendChild(div);
            });
        } catch (err) {
            console.error(err);
            document.getElementById('task-list').innerHTML = '<p class="error-msg">Failed to load tasks</p>';
        }
    }

    // add new task
    async function addTask() {
        const title = document.getElementById('title').value.trim();
        const description = document.getElementById('description').value.trim();

        if (!title) {
            showMsg('add-msg', 'Title is required');
            return;
        }

        try {
            const res = await fetch(baseUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, completed: false })
            });

            if (!res.ok) {
                const message = await res.text();
                showMsg('add-msg', message);
                return;
            }

            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            showMsg('add-msg', 'Task added successfully', true);
            getTasks();
        } catch (err) {
            showMsg('add-msg', 'Failed to add task');
            console.error(err);
        }
    }

    // update task
    async function updateTask(id) {
        const title = document.getElementById(`title-${id}`).value.trim();
        const description = document.getElementById(`desc-${id}`).value.trim();
        const completed = document.getElementById(`completed-${id}`).checked;

        if (!title) {
            alert('Title is required');
            return;
        }

        try {
            await fetch(`${baseUrl}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, description, completed })
            });

            getTasks();
        } catch (err) {
            alert('Failed to update task');
            console.error(err);
        }
    }

    // delete task
    async function deleteTask(id) {
        if (!confirm('Are you sure you want to delete this task ?')) return;

        try {
            await fetch(`${baseUrl}/${id}`, { method: 'DELETE' });
            getTasks();
        } catch (err) {
            alert('Failed to delete task');
            console.error(err);
        }
    }

    // load tasks on page load
    getTasks();
</script>
</body>

</html>
